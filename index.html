<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f8f7f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cardex">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Fast, offline-first loyalty card wallet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/apple-touch-icon.png">
<title>Cardex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Nunito:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f9fb;--bg2:#ffffff;--bg3:#edeef2;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.11);
  --text:#1a1917;--muted:#8a8f9a;--icon:#3d4452;
  --accent:#F07060;--accent2:rgba(240,112,96,0.10);
  --danger:#ef4444;--card-r:20px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-md:0 2px 8px rgba(0,0,0,.10),0 8px 24px rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font)}
#app{max-width:430px;margin:0 auto;height:100%;display:flex;flex-direction:column;position:relative}

/* SCREENS */
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.header{padding:env(safe-area-inset-top,18px) 16px 10px;padding-top:calc(env(safe-area-inset-top,0px) + 18px);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;flex-shrink:0}
.header-left{display:flex;justify-content:flex-start;margin-left:-6px}
.header-right{display:flex;justify-content:flex-end;gap:2px;margin-right:-6px}
.app-title{font-size:26px;font-weight:800;letter-spacing:-.3px;font-family:'Nunito',var(--font);text-align:center}
.app-title span{color:var(--accent)}
.header-actions{display:flex;gap:10px}
.icon-btn{width:48px;height:48px;border-radius:14px;background:transparent;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--icon);font-size:18px;transition:background .15s;flex-shrink:0;-webkit-appearance:none;appearance:none}
.icon-btn:active{background:var(--bg3);transform:scale(.93)}

/* LOCATION BANNER */
.location-banner{margin:0 16px 10px;background:var(--accent2);border:.5px solid rgba(240,112,96,.25);border-radius:14px;padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.location-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.location-text{font-size:14px;color:var(--accent);font-weight:500;flex:1}
.location-sub{font-size:11px;color:rgba(240,112,96,.55);margin-top:1px}

/* SECTION LABEL */
.section-label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin:0 0 10px}

/* CARDS GRID */
.cards-scroll{flex:1;overflow-y:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
.cards-scroll::-webkit-scrollbar{display:none}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

/* CARD TILE — loyalty card style */
.card-tile{aspect-ratio:1.586/1;border-radius:8px;position:relative;overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .15s;box-shadow:var(--shadow-md)}
.card-tile:active{transform:scale(.96);box-shadow:var(--shadow)}
.tile-logo-area{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.tile-logo{font-size:42px;font-weight:800;line-height:1;letter-spacing:-.5px}
.tile-bottom{position:absolute;bottom:0;left:0;right:0;padding:7px 11px;background:rgba(0,0,0,0.28);display:flex;justify-content:space-between;align-items:center;gap:4px;z-index:2}
.tile-name{font-size:12px;font-weight:600;color:#fff;line-height:1.2;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile-num{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.75);flex-shrink:0}
.tile-badge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.25);border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.95);backdrop-filter:blur(4px);z-index:3}

/* SUGGESTED ROW */
.suggested-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.suggested-row::-webkit-scrollbar{display:none}
.suggested-tile{flex-shrink:0;width:160px;aspect-ratio:1.586/1;border-radius:8px;position:relative;overflow:hidden;cursor:pointer;transition:transform .12s;box-shadow:0 3px 12px rgba(240,112,96,.25);border:1.5px solid rgba(240,112,96,.5)}
.suggested-tile:active{transform:scale(.95)}

/* FAB */
.fab{position:absolute;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:16px;right:16px;background:var(--accent);color:#fff;border:none;border-radius:16px;height:58px;font-family:var(--font);font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(240,112,96,.38),0 1px 4px rgba(240,112,96,.2);transition:transform .1s,box-shadow .1s;-webkit-appearance:none;appearance:none}
.fab:active{transform:scale(.97);box-shadow:0 2px 10px rgba(240,112,96,.25)}

.cards-bottom-pad{height:90px;flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;flex-direction:column;justify-content:flex-end;z-index:100;animation:overlayIn .18s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--bg2);border-radius:28px 28px 0 0;padding:0 20px calc(env(safe-area-inset-bottom,0px) + 36px);animation:sheetUp .22s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.12)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 20px}
.modal-title{font-size:19px;font-weight:600;margin-bottom:20px}

/* SETTINGS */
.settings-section{margin-bottom:22px}
.settings-section-label{font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.settings-option{background:var(--bg3);border:.5px solid var(--border2);border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:8px;transition:background .15s}
.settings-option:active{background:var(--border2)}
.settings-option.active{background:var(--accent2);border-color:rgba(240,112,96,.4)}
.settings-option-label{font-size:15px;font-weight:500}
.settings-option-sub{font-size:12px;color:var(--muted);margin-top:2px}
.settings-check{width:24px;height:24px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0}

/* FORM */
.field-group{margin-bottom:16px}
.field-label{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:6px;display:block}
.field-input{width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:12px;padding:14px 16px;color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;appearance:none}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,112,96,.1)}
.field-input::placeholder{color:var(--muted)}


.color-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:4px}
.color-opt{width:100%;aspect-ratio:1;border-radius:10px;cursor:pointer;border:2.5px solid transparent;transition:transform .1s,border-color .15s}
.color-opt:active{transform:scale(.9)}
.color-opt.sel{border-color:white;box-shadow:0 0 0 2px var(--accent)}

.btn-row{display:flex;gap:12px;margin-top:20px}
.btn-primary{flex:1;background:var(--accent);color:#fff;border:none;border-radius:14px;height:52px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;box-shadow:0 2px 12px rgba(240,112,96,.3);transition:opacity .15s,transform .1s}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-secondary{flex:1;background:var(--bg3);color:var(--text);border:none;border-radius:14px;height:52px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;transition:opacity .15s}
.btn-secondary:active{opacity:.75}
.btn-danger{flex:1;background:var(--danger);color:#fff;border:none;border-radius:14px;height:52px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;box-shadow:0 2px 12px rgba(239,68,68,.28);display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-danger:active{opacity:.85}
.btn-done{flex:1;background:var(--text);color:#fff;border:none;border-radius:14px;height:52px;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;-webkit-appearance:none;appearance:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-done:active{opacity:.75}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;flex-direction:column;justify-content:flex-end;z-index:300;animation:overlayIn .15s ease}
.confirm-sheet{background:var(--bg2);border-radius:28px 28px 0 0;padding:28px 20px calc(env(safe-area-inset-bottom,0px) + 28px);animation:sheetUp .2s cubic-bezier(.32,.72,0,1)}
.confirm-title{font-size:17px;font-weight:600;margin-bottom:6px}
.confirm-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.5}

.scan-btn{width:100%;background:var(--accent2);border:1px dashed rgba(240,112,96,.35);border-radius:14px;padding:15px;display:flex;align-items:center;justify-content:center;gap:9px;color:var(--accent);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:16px;-webkit-appearance:none;appearance:none;transition:background .15s}
.scan-btn:active{background:rgba(240,112,96,.2)}

/* CARD DETAIL */
.card-visual{margin:16px 16px 0;border-radius:10px 10px 0 0;overflow:hidden;flex-shrink:0;box-shadow:none}
.card-visual-header{padding:18px 18px 16px;display:flex;align-items:center;gap:14px}
.card-visual-logo{font-size:42px;font-weight:800;line-height:1;flex-shrink:0}
.card-visual-info{flex:1;min-width:0}
.card-visual-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.card-barcode-body{margin:0 16px;background:#fff;border-radius:0 0 10px 10px;padding:20px 16px 16px;box-shadow:var(--shadow-md);flex-shrink:0}

.barcode-section{padding:12px 16px 0;flex-shrink:0}
.display-toggle{display:flex;background:var(--bg3);border-radius:12px;padding:3px;margin-bottom:0}
.toggle-opt{flex:1;padding:9px;text-align:center;font-size:14px;border-radius:10px;cursor:pointer;color:var(--muted);transition:all .15s}
.toggle-opt.active{background:var(--bg2);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}

.barcode-display{display:flex;flex-direction:column;align-items:center;gap:8px}
.barcode-num{font-family:var(--mono);font-size:14px;color:#333;letter-spacing:.12em;font-weight:500}
.barcode-type-label{font-size:11px;color:#bbb;letter-spacing:.06em;text-transform:uppercase}
.qr-display{display:flex;flex-direction:column;align-items:center;gap:8px}

.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-bottom{padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 16px);display:flex;gap:12px;flex-shrink:0}

/* SCANNER */
.scanner-modal{position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column}
.scanner-viewport{flex:1;position:relative;overflow:hidden}
#qg-scan{width:100%;height:100%}
#qg-scan video{width:100%;height:100%;object-fit:cover}
#qg-scan canvas{position:absolute!important;top:0;left:0;width:100%!important;height:100%!important}
.scan-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:78%;max-width:300px;height:110px;border:2px solid var(--accent);border-radius:12px;position:relative}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);animation:scanLine 2s ease-in-out infinite}
@keyframes scanLine{0%,100%{top:0}50%{top:calc(100% - 2px)}}
.scan-hint{color:rgba(255,255,255,.55);font-size:13px;margin-top:18px}
.scanner-header{padding:calc(env(safe-area-inset-top,0px) + 18px) 16px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.scanner-title{font-size:16px;font-weight:500;color:white}
.scanned-result{position:absolute;bottom:90px;left:20px;right:20px;background:rgba(15,15,17,.92);border:.5px solid var(--accent);border-radius:14px;padding:14px;text-align:center}
.scanned-code{font-family:var(--mono);font-size:14px;color:var(--accent)}

/* IO OPTION */
.io-option{background:var(--bg3);border:.5px solid var(--border2);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:10px;transition:background .15s}
.io-option:active{background:var(--border2)}
.io-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.io-label{font-size:15px;font-weight:500}
.io-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* EMPTY */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px;color:var(--muted)}
.empty-icon{font-size:52px;opacity:.35}
.empty-text{font-size:15px;text-align:center;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(26,25,23,.88);color:#fff;border-radius:24px;padding:11px 22px;font-size:14px;white-space:nowrap;z-index:400;pointer-events:none;animation:toastIn .18s ease;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* INSTALL BANNER */
.install-banner{margin:0 16px 10px;background:var(--accent2);border:.5px solid rgba(240,112,96,.25);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.install-banner:active{background:rgba(240,112,96,.18)}
.install-text{font-size:14px;color:var(--accent);font-weight:500;flex:1}
.install-sub{font-size:11px;color:rgba(240,112,96,.6);margin-top:1px}
.install-dismiss{color:rgba(240,112,96,.5);font-size:20px;padding:2px 4px}

/* BRAND PREVIEW in AddModal */
.brand-preview{border-radius:16px;padding:18px;aspect-ratio:1.586/1;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-md)}
.brand-preview::after{content:'';position:absolute;right:-18px;top:-18px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.13)}
.brand-preview-logo{font-size:22px;font-weight:700;position:relative;z-index:1}
.brand-preview-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);position:relative;z-index:1}
</style>
</head>
<body>
<div id="app"></div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW error',e));
  });
}
</script>

<!-- Dependencies -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Brand profiles for popular loyalty/reward cards ── */
const BRAND_PROFILES = {
  // color = H/S of brand hue at L=91% (matches canvas sampling formula)
  'pc optimum':   { color:'#FFD8D9', accent:'#8b0000', logo:'PC' },
  'optimum':      { color:'#FFD8D9', accent:'#8b0000', logo:'PC' },
  'air miles':    { color:'#D0DAFF', accent:'#1a2f6b', logo:'✈' },
  'airmiles':     { color:'#D0DAFF', accent:'#1a2f6b', logo:'✈' },
  'more rewards': { color:'#C8F5D8', accent:'#1e7e34', logo:'MR' },
  'scene+':       { color:'#D8D8FF', accent:'#2a2a6e', logo:'▶' },
  'scene':        { color:'#D8D8FF', accent:'#2a2a6e', logo:'▶' },
  'triangle':     { color:'#FFD0D0', accent:'#cc0000', logo:'△' },
  'canadian tire':{ color:'#FFD0D0', accent:'#cc0000', logo:'△' },
  'starbucks':    { color:'#C5EBE0', accent:'#00704a', logo:'★' },
  'tim hortons':  { color:'#FFD2D2', accent:'#c8102e', logo:'TH' },
  'tims':         { color:'#FFD2D2', accent:'#c8102e', logo:'TH' },
  'petro-canada': { color:'#FFD0D5', accent:'#c0152d', logo:'⛽' },
  'petro':        { color:'#FFD0D5', accent:'#c0152d', logo:'⛽' },
  'esso':         { color:'#D0E2FF', accent:'#1565c0', logo:'⛽' },
  'costco':       { color:'#CDE0FF', accent:'#005daa', logo:'C' },
  'walmart':      { color:'#CDE4FF', accent:'#0071ce', logo:'★' },
  'hbc rewards':  { color:'#DDDDF5', accent:'#2d2d44', logo:'HBC' },
  'hudson bay':   { color:'#DDDDF5', accent:'#2d2d44', logo:'HBC' },
  'the bay':      { color:'#DDDDF5', accent:'#2d2d44', logo:'HBC' },
  'ikea family':  { color:'#CCE0FF', accent:'#0051a5', logo:'IKEA' },
  'ikea':         { color:'#CCE0FF', accent:'#0051a5', logo:'IKEA' },
  'safeway':      { color:'#FFD0D0', accent:'#d4191e', logo:'SW' },
  'sobeys':       { color:'#FFD2D2', accent:'#c8102e', logo:'SB' },
  'dollarama':    { color:'#FFD0D0', accent:'#e53935', logo:'$' },
  'cineplex':     { color:'#FFD5D5', accent:'#8b0000', logo:'🎬' },
  'caa':          { color:'#CCDAFF', accent:'#003087', logo:'CAA' },
  'best buy':     { color:'#CCE2FF', accent:'#003b64', logo:'BB' },
  'sport chek':   { color:'#FFD0D0', accent:'#cc0000', logo:'SC' },
  'shoppers':     { color:'#FFD0D0', accent:'#cc0000', logo:'SDM' },
  'loblaws':      { color:'#FFD8D9', accent:'#8b0000', logo:'PC' },
  'superstore':   { color:'#FFD8D9', accent:'#8b0000', logo:'PC' },
  'save on':      { color:'#C8F5D8', accent:'#1e7e34', logo:'MR' },
  'save-on':      { color:'#C8F5D8', accent:'#1e7e34', logo:'MR' },
  'rbc':          { color:'#CCE0FF', accent:'#002d72', logo:'RBC' },
  'td':           { color:'#C8F5DC', accent:'#00a850', logo:'TD' },
  'bmo':          { color:'#CCE8FF', accent:'#0079c1', logo:'BMO' },
  'scotiabank':   { color:'#FFD2D2', accent:'#d4262b', logo:'SC' },
  'cibc':         { color:'#FFD2D8', accent:'#c41230', logo:'CIBC' },
  'marriott':     { color:'#FFD8E0', accent:'#a2122f', logo:'M' },
  'hilton':       { color:'#CCDEFF', accent:'#004a97', logo:'H' },
  'aeroplan':     { color:'#FFD2D2', accent:'#8b0000', logo:'✈' },
  'air canada':   { color:'#FFD2D2', accent:'#c8102e', logo:'AC' },
  'westjet':      { color:'#CCE8FF', accent:'#0071bc', logo:'WJ' },
};

function getBrandProfile(cardName) {
  const nm = cardName.toLowerCase().trim();
  if (BRAND_PROFILES[nm]) return BRAND_PROFILES[nm];
  for (const [key, profile] of Object.entries(BRAND_PROFILES)) {
    if (nm.includes(key)) return profile;
  }
  return null;
}

/* ── Brand domain map: card name → domain for logo lookup ── */

function getBrandDomain(cardName) {
  const nm = cardName.toLowerCase().trim();
  // 1. Exact match
  if (BRAND_DOMAINS[nm]) return BRAND_DOMAINS[nm];
  // 2. Partial match against known map
  for (const [key, domain] of Object.entries(BRAND_DOMAINS)) {
    if (nm.includes(key) || key.includes(nm)) return domain;
  }
  // 3. Fallback: construct domain from card name — try name.com
  // Strip common loyalty suffixes, collapse spaces, lowercase
  const cleaned = nm
    .replace(/\b(rewards?|points?|card|plus|club|optimum|advantage|perks?)\b/g, '')
    .replace(/[^a-z0-9]+/g, '')
    .trim();
  return cleaned.length > 2 ? `${cleaned}.com` : null;
}

/* ── Sample background colour from the 4 corners of the logo image ── */
function sampleCornerColor(img) {
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const inset = 5;
  const w = img.width, wh = img.height;
  const spots = [
    [inset,     inset],
    [w - inset, inset],
    [inset,     wh - inset],
    [w - inset, wh - inset],
  ];
  let r = 0, g = 0, b = 0;
  spots.forEach(([x, y]) => {
    const px = ctx.getImageData(x, y, 1, 1).data;
    r += px[0]; g += px[1]; b += px[2];
  });
  r = Math.round(r / 4);
  g = Math.round(g / 4);
  b = Math.round(b / 4);
  return `#${[r,g,b].map(v => v.toString(16).padStart(2,'0')).join('')}`;
}

/* ── Fetch logo from logo.dev, sample corner colour, return both as base64/hex ── */
async function fetchLogoAssets(cardName) {
  const domain = getBrandDomain(cardName);
  if (!domain) return null;
  const src = `https://img.logo.dev/${domain}?token=${LOGO_DEV_TOKEN}&size=128&format=png`;
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        // Capture base64 for display
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 128, 128);
        const logoBase64 = canvas.toDataURL('image/png');
        // Sample corner colour from original (un-scaled) image for accuracy
        const dominantColor = sampleCornerColor(img);
        resolve({ logoBase64, dominantColor });
      } catch { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = src;
    setTimeout(() => resolve(null), 6000);
  });
}

function getCardBackground(card) {
  return card.color || '#e8600a';
}

// Returns true if the hex color is light enough to need dark text
function isLightColor(hex) {
  const h = hex.replace('#', '');
  if (h.length < 6) return false;
  const r = parseInt(h.slice(0,2),16);
  const g = parseInt(h.slice(2,4),16);
  const b = parseInt(h.slice(4,6),16);
  // Perceived luminance (WCAG formula)
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.55;
}

function getCardLogo(card) {
  // Prefer saved real logo — no tint needed, image speaks for itself
  if (card.logoBase64) return { imgSrc: card.logoBase64, value: null, color: null };
  const profile = getBrandProfile(card.name);
  // Use accent (dark brand color) so text logo contrasts against the light pastel background
  if (profile) return { imgSrc: null, value: profile.logo, color: profile.accent };
  return { imgSrc: null, value: card.emoji, color: 'rgba(0,0,0,0.65)' };
}

];

function sortCards(cards, sortBy) {
  const c = [...cards];
  if (sortBy === 'name')     return c.sort((a, b) => a.name.localeCompare(b.name));
  if (sortBy === 'lastUsed') return c.sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0));
  return c.sort((a, b) => (b.useCount || 0) - (a.useCount || 0) || a.name.localeCompare(b.name));
}

/* ── Barcode / QR ── */
function BarcodeDisplay({ code }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !code || !window.JsBarcode) return;
    const norm = code.replace(/\s/g, '');
    try {
      JsBarcode(ref.current, norm, {
        format: 'CODE128',
        width: 2,
        height: 80,
        displayValue: false,
        margin: 0,
        background: '#ffffff',
        lineColor: '#111111'
      });
    } catch (e) {}
  }, [code]);
  return (
    <div className="barcode-display">
      <svg ref={ref} style={{ maxWidth: '100%', width: '100%' }} />
      <div className="barcode-num">{code}</div>
      <div className="barcode-type-label">Code 128</div>
    </div>
  );
}

function QRDisplay({ code }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !code || !window.QRCode) return;
    ref.current.innerHTML = '';
    try { new QRCode(ref.current, { text: code, width: 190, height: 190, colorDark: '#111', colorLight: '#fff', correctLevel: QRCode.CorrectLevel.M }); } catch (e) {}
  }, [code]);
  return (
    <div className="qr-display">
      <div ref={ref} />
      <div className="barcode-num">{code}</div>
    </div>
  );
}

/* ── Scanner ── */
function ScannerView({ onDetected, onClose }) {
  const [code, setCode] = useState('');
  const started = useRef(false);
  useEffect(() => {
    const el = document.getElementById('qg-scan');
    if (!el || started.current) return;
    Quagga.init({
      inputStream: { name: 'Live', type: 'LiveStream', target: el, constraints: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } },
      decoder: { readers: ['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader','codabar_reader'] },
      locate: true
    }, err => {
      if (err) { alert('Camera error: ' + (err.message || err)); onClose(); return; }
      Quagga.start(); started.current = true;
      let last = '';
      Quagga.onDetected(r => {
        const c = r.codeResult.code;
        if (c === last) return; last = c; setCode(c);
        setTimeout(() => onDetected(c), 700);
      });
    });
    return () => { if (started.current) { Quagga.stop(); started.current = false; } };
  }, []);
  return (
    <div className="scanner-modal">
      <div className="scanner-header">
        <button className="icon-btn" onClick={onClose} style={{ background: 'rgba(255,255,255,.1)', borderColor: 'rgba(255,255,255,.15)', color: 'white' }}>✕</button>
        <span className="scanner-title">Scan barcode</span>
      </div>
      <div className="scanner-viewport">
        <div id="qg-scan" />
        <div className="scan-overlay">
          <div className="scan-frame"><div className="scan-line" /></div>
          <div className="scan-hint">Hold steady over barcode</div>
        </div>
        {code && <div className="scanned-result"><div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 3 }}>Detected</div><div className="scanned-code">{code}</div></div>}
      </div>
    </div>
  );
}

/* ── Add/Edit Modal ── */
function AddModal({ initial, onSave, onClose }) {
  const [name, setName] = useState(initial?.name || '');
  const [number, setNumber] = useState(initial?.number || '');
  const [color, setColor] = useState(initial?.color || CARD_COLORS[0]);
  const [keywords, setKeywords] = useState(initial?.keywords || '');
  const [scanning, setScanning] = useState(false);
  const [logoBase64, setLogoBase64] = useState(initial?.logoBase64 || null);
  const [logoStatus, setLogoStatus] = useState('idle'); // idle | loading | found | failed

  const debounceRef = useRef(null);
  const colorManuallySet = useRef(false);

  useEffect(() => {
    // Clear debounce on name change
    clearTimeout(debounceRef.current);
    if (!name.trim()) { setLogoStatus('idle'); return; }

    debounceRef.current = setTimeout(async () => {
      // Try to fetch real logo
      const domain = getBrandDomain(name);
      if (domain) {
        setLogoStatus('loading');
        const assets = await fetchLogoAssets(name);
        if (assets) {
          setLogoBase64(assets.logoBase64);
          setLogoStatus('found');
          if (!colorManuallySet.current) {
            // Prefer the corner-sampled real color; fall back to preset if sampling gave nothing
            const profile = getBrandProfile(name);
            setColor(assets.dominantColor || (profile ? profile.color : CARD_COLORS[0]));
          }
          return;
        }
      }
      // Fall back to static brand profile color suggestion
      setLogoBase64(null);
      setLogoStatus('failed');
      const profile = getBrandProfile(name);
      if (profile && !colorManuallySet.current) {
        setColor(profile.color);
      }
    }, 700);

    return () => clearTimeout(debounceRef.current);
  }, [name]);

  if (scanning) return <ScannerView onDetected={c => { setNumber(c); setScanning(false); }} onClose={() => setScanning(false)} />;

  const save = () => {
    if (!name.trim() || !number.trim()) return;
    onSave({
      id: initial?.id || Date.now().toString(),
      name: name.trim(), number: number.trim(),
      color, keywords: keywords.trim(),
      logoBase64: logoBase64 || null,
      useCount: initial?.useCount || 0, lastUsed: initial?.lastUsed || 0
    });
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="modal-handle" />
        <div className="modal-title">{initial ? 'Edit card' : 'Add card'}</div>

        <div className="field-group">
          <label className="field-label">Card name</label>
          <input className="field-input" placeholder="e.g. PC Optimum" value={name} onChange={e => setName(e.target.value)} />
          {logoStatus === 'loading' && (
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 5 }}>Looking up logo…</div>
          )}
          {logoStatus === 'found' && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8, padding: '8px 10px', background: 'var(--accent2)', borderRadius: 10 }}>
              <img src={logoBase64} alt="" style={{ width: 28, height: 28, objectFit: 'contain', borderRadius: 4, flexShrink: 0 }} />
              <span style={{ fontSize: 12, color: 'var(--accent)', fontWeight: 500 }}>✓ Logo found — colour auto-matched</span>
            </div>
          )}
        </div>
        <div className="field-group">
          <label className="field-label">Card number</label>
          <input className="field-input" placeholder="Enter or scan" value={number} onChange={e => setNumber(e.target.value)} style={{ fontFamily: 'var(--mono)' }} />
        </div>
        <button className="scan-btn" onClick={() => setScanning(true)}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          Scan barcode with camera
        </button>
        <div className="field-group">
          <label className="field-label">Location keywords (optional)</label>
          <input className="field-input" placeholder="e.g. Save on Foods, Winners" value={keywords} onChange={e => setKeywords(e.target.value)} />
          <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 5 }}>Comma-separated — shows card for nearby store.</div>
        </div>

        <div className="field-group">
          <label className="field-label">Card colour</label>
          <div className="color-grid">{CARD_COLORS.map(c => <div key={c} className={`color-opt${color === c ? ' sel' : ''}`} style={{ background: c }} onClick={() => { colorManuallySet.current = true; setColor(c); }} />)}</div>
        </div>


        <div className="btn-row">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} style={{ opacity: (!name.trim() || !number.trim()) ? .4 : 1 }}>Save card</button>
        </div>
      </div>
    </div>
  );
}

/* ── Settings Modal ── */
function SettingsModal({ settings, onSave, onClose, cards, onImport }) {
  const fileRef = useRef(null);

  const selectSort = id => {
    onSave({ ...settings, sortBy: id });
    onClose();
  };

  const exportAll = () => {
    const blob = new Blob([JSON.stringify(cards, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'cardex-backup.json'; a.click();
    URL.revokeObjectURL(url); onClose();
  };

  const handleFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (Array.isArray(parsed)) { onImport(parsed); onClose(); } else alert('Invalid backup file.');
      } catch { alert('Could not parse file.'); }
    };
    r.readAsText(file);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="modal-handle" />
        <div className="modal-title">Settings</div>

        <div className="settings-section">
          <div className="settings-section-label">Sort cards by</div>
          {SORT_OPTIONS.map(opt => (
            <div key={opt.id} className={`settings-option${settings.sortBy === opt.id ? ' active' : ''}`} onClick={() => selectSort(opt.id)}>
              <div>
                <div className="settings-option-label">{opt.label}</div>
                <div className="settings-option-sub">{opt.sub}</div>
              </div>
              {settings.sortBy === opt.id && <div className="settings-check">✓</div>}
            </div>
          ))}
        </div>

        <div className="settings-section">
          <div className="settings-section-label">Data</div>
          <div className="io-option" onClick={exportAll}>
            <div className="io-icon" style={{ background: 'var(--accent2)' }}>📤</div>
            <div><div className="io-label">Export backup</div><div className="io-sub">Download all cards as JSON</div></div>
          </div>
          <div className="io-option" onClick={() => fileRef.current?.click()}>
            <div className="io-icon" style={{ background: 'var(--bg3)' }}>📥</div>
            <div><div className="io-label">Import backup</div><div className="io-sub">Restore cards from JSON file</div></div>
          </div>
          <input ref={fileRef} type="file" accept=".json" style={{ display: 'none' }} onChange={handleFile} />
        </div>

        <div style={{ textAlign: 'center', paddingTop: 8, paddingBottom: 4 }}>
          <img src="icons/chewy-studios.png" alt="Chewy Studios" style={{ height: 48, opacity: 0.60 }} />
        </div>
      </div>
    </div>
  );
}

      </div>
      <div className="detail-scroll">
        <div className="card-visual" style={{ background: bg }}>
          <div className="card-visual-header">
            <div className="card-visual-logo" style={{ color: logo.color }}>
              {logo.imgSrc
                ? <img src={logo.imgSrc} alt="" style={{ width: 72, height: 72, objectFit: 'contain' }} />
                : logo.value}
            </div>
            <div className="card-visual-info">
              <div className="card-visual-name" style={{ color: isLightColor(bg) ? 'rgba(0,0,0,0.8)' : '#fff' }}>{card.name}</div>
            </div>
          </div>
        </div>
        <div className="card-barcode-body">
          {mode === 'barcode' ? <BarcodeDisplay code={card.number} /> : <QRDisplay code={card.number} />}
        </div>
        <div className="barcode-section">
          <div className="display-toggle">
            <div className={`toggle-opt${mode === 'barcode' ? ' active' : ''}`} onClick={() => { setMode('barcode'); onModeChange('barcode'); }}>Barcode</div>
            <div className={`toggle-opt${mode === 'qr' ? ' active' : ''}`} onClick={() => { setMode('qr'); onModeChange('qr'); }}>QR code</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8,padding:'7px 12px',background:'rgba(0,0,0,.04)',borderRadius:10}}>
            <span style={{fontSize:15}}>☀️</span>
            <span style={{fontSize:12,color:'var(--muted)'}}>Turn up your screen brightness for easier scanning</span>
          </div>
        </div>
        <button onClick={copy} style={{ margin: '12px 16px 0', background: 'var(--bg2)', border: '.5px solid var(--border2)', borderRadius: 12, padding: '12px 16px', color: copied ? 'var(--accent)' : 'var(--muted)', fontFamily: 'var(--font)', fontSize: 14, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, justifyContent: 'center', width: 'calc(100% - 32px)', boxShadow: 'var(--shadow)' }}>
          {copied ? '✓ Copied!' : '⎘ Copy number'}
        </button>
        {card.keywords && (
          <div style={{ padding: '14px 16px 0' }}>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 7, textTransform: 'uppercase', letterSpacing: '.08em', fontWeight: 500 }}>Location keywords</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {card.keywords.split(',').map(k => k.trim()).filter(Boolean).map(k => (
                <span key={k} style={{ background: 'var(--accent2)', border: '.5px solid rgba(240,112,96,.3)', borderRadius: 20, padding: '5px 12px', fontSize: 13, color: 'var(--accent)' }}>{k}</span>
              ))}
            </div>
          </div>
        )}
        <div style={{ height: 20 }} />
      </div>
      <div className="detail-bottom">
        <button className="btn-danger" onClick={() => setConfirmDel(true)}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          Delete
        </button>
        <button className="btn-done" onClick={onBack}>Done</button>
      </div>

      {confirmDel && (
        <div className="confirm-overlay" onClick={() => setConfirmDel(false)}>
          <div className="confirm-sheet" onClick={e => e.stopPropagation()}>
            <div className="confirm-title">Delete "{card.name}"?</div>
            <div className="confirm-sub">This will permanently remove the card. You can re-add it later if needed.</div>
            <div className="btn-row" style={{ marginTop: 0 }}>
              <button className="btn-done" onClick={() => setConfirmDel(false)}>Cancel</button>
              <button className="btn-danger" onClick={onDelete}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
                Delete
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Card Tile Component ── */
function CardTile({ card, isSuggested, onClick, className }) {
  const logo = getCardLogo(card);
  const bg = getCardBackground(card);
  const numPreview = card.number ? '···' + card.number.replace(/\s/g, '').slice(-4) : '';
  return (
    <div
      className={`card-tile${className ? ' ' + className : ''}`}
      style={{ background: bg, ...(isSuggested ? { boxShadow: '0 0 0 2px rgba(240,112,96,.6), 0 4px 16px rgba(240,112,96,.25)' } : {}) }}
      onClick={onClick}
    >
      <div className="tile-logo-area">
        <div className="tile-logo" style={{ color: logo.color }}>
          {logo.imgSrc
            ? <img src={logo.imgSrc} alt="" style={{ width: 78, height: 78, objectFit: 'contain' }} />
            : logo.value}
        </div>
      </div>
      <div className="tile-bottom">
        <div className="tile-name">{card.name}</div>
        <div className="tile-num">{numPreview}</div>
      </div>
      {isSuggested && <div className="tile-badge">Nearby</div>}
    </div>
  );
}

/* ── App ── */
function App() {
  const [cards, setCards] = useState(loadCards);
  const [settings, setSettings] = useState(loadSettings);
  const [view, setView] = useState('home');
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [editCard, setEditCard] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [locationStore, setLocationStore] = useState(null);
  const [locLoading, setLocLoading] = useState(false);
  const [toast, setToast] = useState('');
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);
  const [isIOS, setIsIOS] = useState(false);

  useEffect(() => { saveCards(cards); }, [cards]);
  useEffect(() => { saveSettings(settings); }, [settings]);

  useEffect(() => {
    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone;
    setIsIOS(ios);
    if (ios) setShowInstallBanner(true);
    const handler = e => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const installApp = async () => {
    if (installPrompt) {
      installPrompt.prompt();
      const { outcome } = await installPrompt.userChoice;
      if (outcome === 'accepted') { setShowInstallBanner(false); setInstallPrompt(null); }
    }
  };

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(''), 2200); };

  const detectLocation = useCallback(() => {
    if (!navigator.geolocation) { showToast('Geolocation not supported'); return; }
    setLocLoading(true);
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const { latitude: lat, longitude: lon } = pos.coords;
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=18`, { headers: { 'Accept-Language': 'en' } });
        const data = await res.json();
        const combined = (data.display_name + ' ' + (data.name || '')).toLowerCase();
        let matched = null;
        for (const s of SUGGESTED_STORES) { if (s.keywords.some(k => combined.includes(k))) { matched = s; break; } }
        setLocationStore(matched ? { ...matched, coords: `${lat.toFixed(4)},${lon.toFixed(4)}` } : null);
      } catch { showToast('Could not fetch location'); }
      setLocLoading(false);
    }, () => { showToast('Location access denied'); setLocLoading(false); });
  }, []);

  useEffect(() => { detectLocation(); }, []);

  // Intercept the device/browser back gesture so it navigates home instead of closing the app
  useEffect(() => {
    const goHome = () => { setView('home'); setSelected(null); setShowAdd(false); setEditCard(null); };
    const onPop = e => {
      if (view === 'detail' || showAdd) {
        // Push a replacement entry so the stack stays intact for future back gestures
        history.pushState({ cardex: true }, '');
        goHome();
      }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, [view, showAdd]);

  const openCard = cardId => {
    setCards(prev => prev.map(c => c.id === cardId ? { ...c, useCount: (c.useCount || 0) + 1, lastUsed: Date.now() } : c));
    // Push a history entry so the back gesture has somewhere to go
    history.pushState({ cardex: true }, '');
    setSelected(cardId);
    setView('detail');
  };

  const addOrUpdate = card => {
    if (editCard) { setCards(p => p.map(c => c.id === card.id ? card : c)); showToast('Card updated'); }
    else { setCards(p => [card, ...p]); showToast('Card added!'); }
    setShowAdd(false); setEditCard(null);
  };

  const deleteCard = id => {
    setCards(p => p.filter(c => c.id !== id));
    setView('home'); setSelected(null); showToast('Card removed');
  };

  const importCards = imported => {
    setCards(p => {
      const ex = new Set(p.map(c => c.id));
      const nw = imported.filter(c => !ex.has(c.id));
      showToast(`Imported ${nw.length} card${nw.length !== 1 ? 's' : ''}`);
      return [...nw, ...p];
    });
  };

  const saveSettingsAndClose = newSettings => {
    setSettings(newSettings);
  };

  /* Suggested cards */
  const suggestedCards = locationStore?.storeCards?.length
    ? cards.filter(c => {
        const kw = (c.keywords || '').toLowerCase();
        const nm = c.name.toLowerCase();
        return locationStore.storeCards.some(sc => nm.includes(sc) || kw.includes(sc) || sc.includes(nm.split(' ')[0]));
      })
    : [];
  const suggestedIds = new Set(suggestedCards.map(c => c.id));

  const sortedCards = sortCards(cards, settings.sortBy);

  /* Detail view */
  if (view === 'detail' && selected) {
    const card = cards.find(c => c.id === selected);
    if (!card) { setView('home'); setSelected(null); return null; }
    return <>
      <DetailView
        card={card}
        onBack={() => { setView('home'); setSelected(null); }}
        onEdit={() => { setEditCard(card); setShowAdd(true); }}
        onDelete={() => deleteCard(card.id)}
        onModeChange={m => setCards(prev => prev.map(c => c.id === card.id ? { ...c, displayMode: m } : c))}
      />
      {showAdd && <AddModal initial={editCard} onSave={addOrUpdate} onClose={() => { setShowAdd(false); setEditCard(null); }} />}
      <Toast msg={toast} />
    </>;
  }

  return (
    <div className="screen">
      <div className="header">
        <div className="header-left">
          <button className="icon-btn" onClick={() => setShowSettings(true)} title="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>
            </svg>
          </button>
        </div>
        <div className="app-title">Card<span>ex</span></div>
        <div className="header-right">
          <button className="icon-btn" onClick={detectLocation} title="Detect nearby store">
            {locLoading
              ? <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
              : <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C8.686 2 6 4.686 6 8c0 4.5 6 12 6 12s6-7.5 6-12c0-3.314-2.686-6-6-6z"/><circle cx="12" cy="8" r="2"/></svg>
            }
          </button>
          <button className="icon-btn" onClick={() => { setEditCard(null); setShowAdd(true); }} title="Add card">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      {showInstallBanner && (
        <div className="install-banner" onClick={isIOS ? null : installApp}>
          <div>
            <div className="install-text">📲 Install Cardex</div>
            <div className="install-sub">{isIOS ? 'Tap Share → Add to Home Screen' : 'Add to home screen for offline use'}</div>
          </div>
          <span className="install-dismiss" onClick={e => { e.stopPropagation(); setShowInstallBanner(false); }}>✕</span>
        </div>
      )}

      {locationStore && (
        <div className="location-banner" onClick={detectLocation}>
          <div className="location-dot" />
          <div>
            <div className="location-text">{locationStore.label}</div>
            {locationStore.coords && <div className="location-sub">{locationStore.coords}</div>}
          </div>
          <span style={{ fontSize: 13, color: 'rgba(240,112,96,.55)' }}>↺</span>
        </div>
      )}

      <div className="cards-scroll">
        {suggestedCards.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <div className="section-label">Suggested nearby</div>
            <div className="suggested-row">
              {suggestedCards.map(c => (
                <div
                  key={c.id}
                  className="suggested-tile"
                  style={{ background: getCardBackground(c) }}
                  onClick={() => openCard(c.id)}
                >
                  <div style={{ position:'absolute', inset:'0 0 32px 0', display:'flex', alignItems:'center', justifyContent:'center', zIndex:1, color: getCardLogo(c).color, fontSize: 32, fontWeight: 800 }}>
                    {getCardLogo(c).imgSrc
                      ? <img src={getCardLogo(c).imgSrc} alt="" style={{ width: 58, height: 58, objectFit: 'contain' }} />
                      : getCardLogo(c).value}
                  </div>
                  <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'6px 10px', background:'rgba(0,0,0,0.28)', fontSize: 11, fontWeight: 600, color: '#fff', zIndex:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.name}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {cards.length === 0 && (
          <div className="empty-state">
            <div className="empty-icon">🪪</div>
            <div className="empty-text">No cards yet.<br />Tap below to add your first loyalty card.</div>
          </div>
        )}

        {cards.length > 0 && (
          <div>
            <div className="section-label" style={{ marginBottom: 12 }}>
              Sort by · {SORT_OPTIONS.find(o => o.id === settings.sortBy)?.label}
            </div>
            <div className="cards-grid">
              {sortedCards.map(c => (
                <CardTile
                  key={c.id}
                  card={c}
                  isSuggested={suggestedIds.has(c.id) && suggestedCards.length === 0}
                  onClick={() => openCard(c.id)}
                />
              ))}
            </div>
          </div>
        )}

        <div style={{ height: 20 }} />
      </div>


      {showAdd && <AddModal initial={editCard} onSave={addOrUpdate} onClose={() => { setShowAdd(false); setEditCard(null); }} />}
      {showSettings && (
        <SettingsModal
          settings={settings}
          onSave={saveSettingsAndClose}
          onClose={() => setShowSettings(false)}
          cards={cards}
          onImport={importCards}
        />
      )}
      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>
</body>
</html>
