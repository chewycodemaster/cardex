<!DOCTYPE html>
<html>
<head><title>Generate Cardex Icons</title></head>
<body style="font-family:sans-serif;padding:24px;background:#f8f9fb">
<h2 style="margin:0 0 8px">Cardex Icon Generator</h2>
<p style="color:#888;margin:0 0 20px">Icons will download automatically. Then move them into the <code>icons/</code> folder.</p>
<div id="previews" style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px"></div>
<div id="status" style="color:#F07060;font-weight:500"></div>

<script>
// ── Theme — edit these to update icon colours ──────────────────
const ACCENT  = '#F07060';  // salmon — loyalty card rectangle
const APP_BG  = '#f8f9fb';  // app background (light grey-blue)
// ──────────────────────────────────────────────────────────────

function drawIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.22;

  // App background
  ctx.fillStyle = APP_BG;
  roundRect(ctx, 0, 0, size, size, r);
  ctx.fill();

  const cx = size / 2;
  const cy = size / 2;

  // Card shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = size * 0.07;
  ctx.shadowOffsetY = size * 0.03;

  // Card body
  const cw  = size * 0.70;
  const ch  = size * 0.46;
  const cx0 = cx - cw / 2;
  const cy0 = cy - ch / 2 - size * 0.02;
  const cr  = size * 0.07;

  ctx.fillStyle = ACCENT;
  roundRect(ctx, cx0, cy0, cw, ch, cr);
  ctx.fill();
  ctx.restore();

  // Card shine
  const shine = ctx.createLinearGradient(cx0, cy0, cx0, cy0 + ch);
  shine.addColorStop(0, 'rgba(255,255,255,0.18)');
  shine.addColorStop(1, 'rgba(255,255,255,0.00)');
  roundRect(ctx, cx0, cy0, cw, ch, cr);
  ctx.fillStyle = shine;
  ctx.fill();

  // Decorative circle top-right
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, cx0, cy0, cw, ch, cr);
  ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath();
  ctx.arc(cx0 + cw * 0.85, cy0 - ch * 0.2, ch * 0.65, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Barcode lines
  const bx = cx0 + cw * 0.12;
  const by = cy0 + ch * 0.54;
  const bw = cw * 0.76;
  const bh = ch * 0.28;
  const barWidths = [2,1,3,1,2,1,1,2,3,1,2,1,3,1,2,1,1,3,2,1,2,1,3,1,2];
  const totalUnits = barWidths.reduce((s,v) => s + v, 0);
  const unit = bw / totalUnits;
  let bxc = bx;
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  barWidths.forEach((bw2, i) => {
    if (i % 2 === 0) ctx.fillRect(bxc, by, bw2 * unit - unit * 0.15, bh);
    bxc += bw2 * unit;
  });

  // "cx" lettermark
  ctx.save();
  ctx.font = `bold ${size * 0.16}px -apple-system,sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('cx', cx0 + cw * 0.10, cy0 + ch * 0.30);
  ctx.restore();

  return c;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const icons = [
  { size: 512, filename: 'icon-512.png',         label: '512×512' },
  { size: 192, filename: 'icon-192.png',         label: '192×192' },
  { size: 180, filename: 'apple-touch-icon.png', label: '180×180 (Apple)' },
];

const previews = document.getElementById('previews');
const status   = document.getElementById('status');

icons.forEach(({ size, filename, label }, i) => {
  const canvas = drawIcon(size);
  const displaySize = Math.min(size, 96);
  const preview = document.createElement('canvas');
  preview.width = preview.height = displaySize;
  preview.getContext('2d').drawImage(canvas, 0, 0, displaySize, displaySize);
  preview.style.cssText = `border-radius:${displaySize * 0.22}px;box-shadow:0 2px 12px rgba(0,0,0,0.15)`;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'text-align:center';
  const lbl = document.createElement('div');
  lbl.textContent = label;
  lbl.style.cssText = 'font-size:11px;color:#888;margin-top:6px';
  wrap.appendChild(preview);
  wrap.appendChild(lbl);
  previews.appendChild(wrap);

  setTimeout(() => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  }, i * 300);
});

status.textContent = '✓ Downloading 3 icons — move them into your icons/ folder to replace the old ones.';
</script>
</body>
</html>
